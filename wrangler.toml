name = "client-portal-api"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
main = "worker/index.ts"

# Secrets (set via `wrangler secret put` or CF dashboard):
# ADMIN_KEY            — internal admin API key for privileged endpoints
# BETTER_AUTH_SECRET   — random 32+ char secret for Better Auth (generate with: openssl rand -hex 32)
# BETTER_AUTH_URL      — public URL of this Worker, e.g. https://client-portal-api.workers.dev

[[d1_databases]]
binding = "DB"
database_name = "client-portal-db"
database_id = "06b78cee-dbc6-433f-aef7-ae45b31ad7f1"
migrations_dir = "migrations"
